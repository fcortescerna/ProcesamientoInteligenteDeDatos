<!DOCTYPE html>
<html>

<head>
<title>Reconocimiento de números</title>

<script
src="https://code.jquery.com/jquery-3.4.1.min.js"
integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
crossorigin="anonymous">
</script>

</head>
<body>

<h2>Dibuja un número</h2>

<canvas id="canvas" width="280" height="280" style="border:1px solid black; cursor:crosshair;"></canvas>

<br><br>

<button onclick="predecir()">Predecir</button>
<button onclick="limpiar()">Limpiar</button>

<h3>Resultado:</h3>
<div id="resultado" style="font-size:48px; font-weight:bold;"></div>

<script>

var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

// Fondo negro como MNIST
ctx.fillStyle = "black";
ctx.fillRect(0, 0, 280, 280);

// Trazo blanco, grueso y suavizado
ctx.strokeStyle = "white";
ctx.lineWidth = 22;
ctx.lineCap = "round";
ctx.lineJoin = "round";

var drawing = false;
var lastX = 0, lastY = 0;

canvas.onmousedown = function(e){
    drawing = true;
    var rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
}

canvas.onmouseup = function(){ drawing = false; }
canvas.onmouseleave = function(){ drawing = false; }

canvas.onmousemove = function(e){
    if(!drawing) return;
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;

    // Trazar línea suavizada en vez de cuadrado
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();

    lastX = x;
    lastY = y;
}

function limpiar(){
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 280, 280);
    $("#resultado").html("");
}

function getBoundingBox(){
    // Encuentra el recuadro que encierra el dígito dibujado
    var imageData = ctx.getImageData(0, 0, 280, 280);
    var data = imageData.data;
    var minX = 280, minY = 280, maxX = 0, maxY = 0;
    var found = false;

    for(var y = 0; y < 280; y++){
        for(var x = 0; x < 280; x++){
            var idx = (y * 280 + x) * 4;
            if(data[idx] > 10){ // pixel no negro
                if(x < minX) minX = x;
                if(x > maxX) maxX = x;
                if(y < minY) minY = y;
                if(y > maxY) maxY = y;
                found = true;
            }
        }
    }
    return found ? {minX, minY, maxX, maxY} : null;
}

function predecir(){

    // 1. Encontrar el bounding box del dígito
    var bb = getBoundingBox();
    if(!bb){
        alert("¡Dibuja un número primero!");
        return;
    }

    // 2. Agregar margen al bounding box
    var margin = 20;
    var x = Math.max(0, bb.minX - margin);
    var y = Math.max(0, bb.minY - margin);
    var w = Math.min(280, bb.maxX + margin) - x;
    var h = Math.min(280, bb.maxY + margin) - y;

    // 3. Crear canvas 28x28, centrar y escalar el dígito
    var tempCanvas = document.createElement('canvas');
    tempCanvas.width = 28;
    tempCanvas.height = 28;
    var tempCtx = tempCanvas.getContext('2d');

    // Fondo negro
    tempCtx.fillStyle = "black";
    tempCtx.fillRect(0, 0, 28, 28);

    // Escalar manteniendo proporción y centrar en 20x20 con margen de 4px
    var size = 20;
    var scale = size / Math.max(w, h);
    var scaledW = w * scale;
    var scaledH = h * scale;
    var offsetX = (28 - scaledW) / 2;
    var offsetY = (28 - scaledH) / 2;

    tempCtx.drawImage(canvas, x, y, w, h, offsetX, offsetY, scaledW, scaledH);

    // 4. Extraer píxeles (canal Rojo: negro=0, blanco=255)
    var pixels = [];
    for(var px = 0; px < 28; px++){
        for(var py = 0; py < 28; py++){
            var imgData = tempCtx.getImageData(py, px, 1, 1);
            var color = imgData.data[0] / 255;
            color = (Math.round(color * 100) / 100).toFixed(2);
            pixels.push(color);
        }
    }

    $.post("http://localhost:8000",
        {pixeles: pixels.join(",")},
        function(response){
            console.log("Resultado: " + response);
            $("#resultado").html(response);
        }
    );
}

</script>

</body>
</html>
